name: Release

# 推送形如 v1.4.0 的标签时，自动构建单文件 exe 并发布 GitHub Release。
# 打包前先跑测试作为质量闸；WPF 应用必须在 Windows runner 上构建。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test WordCollector.Tests/WordCollector.Tests.csproj -c Release --nologo

      - name: Publish single-file exe
        run: dotnet publish WordCollector/WordCollector.csproj -c Release -o publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create $env:GITHUB_REF_NAME publish/WordCollector.exe --title "WordCollector $env:GITHUB_REF_NAME" --generate-notes
